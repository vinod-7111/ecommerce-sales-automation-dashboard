<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Sales Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #111827;
    }

    .status {
      text-align: center;
      margin-bottom: 20px;
      color: #6b7280;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.07);
    }

    .card h3 {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.07);
      min-height: 350px;
    }

    .chart-box h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    @media(max-width: 900px) {
      .cards,
      .charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>E-Commerce Sales Automation Dashboard</h1>

  <div class="status" id="status">
    Loading latest data from Supabase...
  </div>

  <div class="cards">

    <div class="card">
      <h3>Total Sales</h3>
      <p id="totalSales">-</p>
    </div>

    <div class="card">
      <h3>Total Profit</h3>
      <p id="totalProfit">-</p>
    </div>

    <div class="card">
      <h3>Total Orders</h3>
      <p id="totalOrders">-</p>
    </div>

    <div class="card">
      <h3>Average Profit Margin</h3>
      <p id="avgMargin">-</p>
    </div>

  </div>

  <div class="charts">

    <div class="chart-box">
      <h2>Sales by Category</h2>
      <canvas id="categoryChart"></canvas>
    </div>

    <div class="chart-box">
      <h2>Profit by State</h2>
      <canvas id="stateChart"></canvas>
    </div>

    <div class="chart-box">
      <h2>Monthly Sales Trend</h2>
      <canvas id="monthlyChart"></canvas>
    </div>

    <div class="chart-box">
      <h2>Top 10 Products by Sales</h2>
      <canvas id="productChart"></canvas>
    </div>

  </div>

</div>

<script>

const SUPABASE_URL =
"sb_publishable_dnGpfSBZgkUt-qCFdUwGyA_szT_UeO3";

const SUPABASE_KEY =
"PASTE_YOUR_SUPABASE_PUBLISHABLE_KEY_HERE";

async function loadDashboard() {

  try {

    const response = await fetch(SUPABASE_URL, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });

    if (!response.ok) {
      throw new Error(
        "Supabase request failed: " +
        response.status +
        " " +
        response.statusText
      );
    }

    const data = await response.json();

    if (!Array.isArray(data) || data.length === 0) {
      throw new Error("No data returned from Supabase.");
    }

    document.getElementById("status").innerText =
      "Dashboard updated: " + new Date().toLocaleString();

    // KPI calculations

    const totalSales =
      data.reduce((sum, row) =>
        sum + Number(row.sales || 0), 0);

    const totalProfit =
      data.reduce((sum, row) =>
        sum + Number(row.profit || 0), 0);

    const totalOrders =
      new Set(data.map(row => row.order_id)).size;

    const avgMargin =
      data.reduce((sum, row) =>
        sum + Number(row.profit_margin || 0), 0)
        / data.length;

    document.getElementById("totalSales").innerText =
      "₹" + totalSales.toLocaleString("en-IN",
      {maximumFractionDigits: 0});

    document.getElementById("totalProfit").innerText =
      "₹" + totalProfit.toLocaleString("en-IN",
      {maximumFractionDigits: 0});

    document.getElementById("totalOrders").innerText =
      totalOrders.toLocaleString("en-IN");

    document.getElementById("avgMargin").innerText =
      avgMargin.toFixed(2) + "%";


    // Sales by Category

    const categorySales = {};

    data.forEach(row => {

      const category = row.category || "Unknown";

      categorySales[category] =
        (categorySales[category] || 0)
        + Number(row.sales || 0);

    });

    new Chart(
      document.getElementById("categoryChart"),
      {
        type: "bar",

        data: {
          labels: Object.keys(categorySales),

          datasets: [{
            label: "Sales",
            data: Object.values(categorySales)
          }]
        },

        options: {
          responsive: true
        }
      }
    );


    // Profit by State

    const stateProfit = {};

    data.forEach(row => {

      const state = row.state || "Unknown";

      stateProfit[state] =
        (stateProfit[state] || 0)
        + Number(row.profit || 0);

    });

    const topStates =
      Object.entries(stateProfit)
      .sort((a,b) => b[1] - a[1])
      .slice(0,10);

    new Chart(
      document.getElementById("stateChart"),
      {
        type: "bar",

        data: {

          labels:
            topStates.map(x => x[0]),

          datasets: [{
            label: "Profit",
            data:
              topStates.map(x => x[1])
          }]

        },

        options: {
          indexAxis: "y",
          responsive: true
        }
      }
    );


    // Monthly Sales

    const monthlySales = {};

    data.forEach(row => {

      if (!row.order_date) return;

      const date =
        new Date(row.order_date);

      const key =
        date.getFullYear() +
        "-" +
        String(date.getMonth()+1)
        .padStart(2,"0");

      monthlySales[key] =
        (monthlySales[key] || 0)
        + Number(row.sales || 0);

    });

    const sortedMonths =
      Object.keys(monthlySales)
      .sort();

    new Chart(
      document.getElementById("monthlyChart"),
      {

        type: "line",

        data: {

          labels:
            sortedMonths,

          datasets: [{
            label: "Monthly Sales",

            data:
              sortedMonths.map(
                month =>
                monthlySales[month]
              )
          }]

        },

        options: {
          responsive: true
        }

      }
    );


    // Top Products

    const productSales = {};

    data.forEach(row => {

      const product =
        row.product || "Unknown";

      productSales[product] =
        (productSales[product] || 0)
        + Number(row.sales || 0);

    });

    const topProducts =
      Object.entries(productSales)
      .sort((a,b) => b[1] - a[1])
      .slice(0,10);

    new Chart(
      document.getElementById("productChart"),
      {

        type: "bar",

        data: {

          labels:
            topProducts.map(x => x[0]),

          datasets: [{
            label: "Sales",

            data:
              topProducts.map(x => x[1])
          }]

        },

        options: {
          indexAxis: "y",
          responsive: true
        }

      }
    );

  }

  catch(error) {

    console.error(error);

    document.getElementById("status").innerText =
      "Error loading dashboard: " +
      error.message;

  }

}

loadDashboard();

</script>

</body>
</html>
